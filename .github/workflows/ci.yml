name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bazel: ["8.x", "9.x", ".bazelversion"]
        folder: [".", "nu/tests"]
      max-parallel: 4
      fail-fast: false
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel != '.bazelversion' && matrix.bazel || '' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          module-root: ${{ matrix.folder }}
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BB_API_KEY }}
            ${{ matrix.bazel != '.bazelversion' && 'common --lockfile_mode=update' || '' }}
      - name: "local-only housekeeping"
        if: matrix.bazel == '.bazelversion' && matrix.folder == '.'
        run: bazel test //tools:preset.update_test
      - name: "build check"
        if: ${{ matrix.folder == '.' }}
        run: bazel build //...
      - name: "module test"
        if: matrix.folder == 'nu/tests'
        run: |
          cd ${{ matrix.folder }}
          bazel test //...
