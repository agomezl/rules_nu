name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bazel: ["8.x", "9.x", ".bazelversion"]
      max-parallel: 3
      fail-fast: false
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel != '.bazelversion' && matrix.bazel || '' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          bazelrc: |
            common --config=ci
            common --remote_header=x-buildbuddy-api-key=${{ secrets.BB_API_KEY }}
            ${{ matrix.bazel != '.bazelversion' && 'common --lockfile_mode=update' || '' }}
      - name: "Housekeeping"
        if: matrix.bazel == '.bazelversion'
        run: bazel test //tools:preset.update_test
      - name: "Run tests"
        run: bazel test //...
