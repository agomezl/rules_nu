name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Bazelisk
        run: |
          mkdir -p ~/.local/bin
          curl -Lo ~/.local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x ~/.local/bin/bazel
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Bazel test
        run: bazel test --config=ci --remote_header=x-buildbuddy-api-key=$BB_API_KEY //...
        env:
          BB_API_KEY: ${{ secrets.BB_API_KEY }}
