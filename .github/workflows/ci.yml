name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Cache Bazelisk binary
        id: cache-bazelisk
        uses: actions/cache@v6
        with:
          path: ~/.local/bin/bazel
          key: bazelisk-${{ runner.os }}

      - name: Install Bazelisk
        if: steps.cache-bazelisk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/bin
          curl -Lo ~/.local/bin/bazel https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x ~/.local/bin/bazel

      - name: Add Bazelisk to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Bazel
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazelisk
          key: bazel-${{ runner.os }}-${{ hashFiles('.bazelversion') }}

      - name: Bazel test
        run: |
          bazel test --config=ci --remote_header=x-buildbuddy-api-key=$BB_API_KEY //...
          cd nu/tests
          bazel test --config=ci --remote_header=x-buildbuddy-api-key=$BB_API_KEY //...
        env:
          BB_API_KEY: ${{ secrets.BB_API_KEY }}
